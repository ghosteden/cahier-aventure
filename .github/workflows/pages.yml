# Déploie le dossier public/ sur GitHub Pages à chaque push sur la branche principale.
# (Hébergement statique gratuit, sans limite de trafic — aucune fonction serveur.)
name: Déploiement GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:        # permet de relancer le déploiement à la main

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true      # active Pages automatiquement si ce n'est pas déjà fait

      - name: Téléverser le site (dossier public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Déployer sur Pages
        id: deployment
        uses: actions/deploy-pages@v4

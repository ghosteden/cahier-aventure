# Configuration Netlify
# Le site est 100% statique : pas d'étape de build.
# La fonction "progress" gère la sauvegarde cloud via Netlify Blobs.

[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# En-têtes utiles
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
